<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tweet-Noise</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L2 7L12 12L22 7L12 2Z"/>
            <path d="M2 17L12 22L22 17"/>
            <path d="M2 12L12 17L22 12"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Tweet-Noise</h1>
          <span class="version">v1.0</span>
        </div>
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text">Active</span>
      </div>
    </div>

    <div class="popup-content">
      <div class="section">
        <div class="section-header">
          <div class="section-info">
            <h2>Filtering</h2>
            <p>Hide shitposts, ragebait & reach-farming</p>
          </div>
          <label class="toggle">
            <input type="checkbox" id="enableToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="section stats-section">
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-number" id="hiddenCount">0</span>
            <span class="stat-label">hidden</span>
          </div>
        </div>
        <button class="btn-icon" id="resetBtn" title="Reset counter">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
      </div>

      <div class="section">
        <div class="section-header">
          <h2>Custom Keywords</h2>
        </div>
        <textarea id="blacklistInput" class="input" placeholder="Enter keywords (one per line)&#10;crypto, follow for follow, etc."></textarea>
        <button class="btn btn-default" id="saveBlacklist">Save Keywords</button>
      </div>

      <div class="section">
        <div class="section-header">
          <h2>AI Provider</h2>
          <span class="badge-free">FREE</span>
        </div>
        
        <select id="apiProvider" class="input select">
          <option value="gemini">Google Gemini</option>
          <option value="openrouter">OpenRouter</option>
          <option value="minimax">MiniMax</option>
          <option value="opencode">OpenCode</option>
          <option value="custom">Custom Endpoint</option>
        </select>
        
        <input type="password" id="geminiApiKeyInput" class="input" placeholder="Enter API Key">
        
        <input type="text" id="apiEndpoint" class="input" placeholder="https://api.example.com/v1/chat" style="display: none;">
        
        <div class="btn-row">
          <button class="btn btn-primary" id="saveApiKey">Save</button>
          <button class="btn btn-outline" id="testApiKey">Test</button>
        </div>
        
        <div class="api-result" id="apiTestResult"></div>
      </div>

      <div class="features">
        <div class="feature-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <path d="M22 4L12 14.01l-3-3"/>
          </svg>
          <span>No payment required</span>
        </div>
        <div class="feature-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <path d="M22 4L12 14.01l-3-3"/>
          </svg>
          <span>Preserves tech & news</span>
        </div>
      </div>
    </div>

    <div class="popup-footer">
      <span>Clean your timeline</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
